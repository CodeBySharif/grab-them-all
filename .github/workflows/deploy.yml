name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: asia-southeast1
  AR_REPOSITORY: ferry-flight
  API_SERVICE: ferry-flight-api
  WEB_SERVICE: ferry-flight-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and build API
        run: dotnet build backend/FerryFlight.Api/FerryFlight.Api.csproj -c Release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPOSITORY }} \
            --location=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
          || gcloud artifacts repositories create ${{ env.AR_REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --description="Ferry & Flight containers"

      - name: Build and push API image
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/api:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" -f backend/FerryFlight.Api/Dockerfile backend/FerryFlight.Api
          docker push "$IMAGE"

      - name: Deploy API to Cloud Run
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/api:${{ github.sha }}
          ORS_API_KEY: ${{ secrets.OPENROUTESERVICE_API_KEY }}
        run: |
          ENV_VARS="ASPNETCORE_ENVIRONMENT=Production"
          if [ -n "$ORS_API_KEY" ]; then
            ENV_VARS="${ENV_VARS},OpenRouteService__ApiKey=${ORS_API_KEY}"
          fi

          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "$ENV_VARS" \
            --quiet

      - name: Resolve API URL
        id: api
        run: |
          URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build and push Web image
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/web:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" -f frontend/Dockerfile frontend
          docker push "$IMAGE"

      - name: Deploy Web to Cloud Run
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/web:${{ github.sha }}
          API_URL: ${{ steps.api.outputs.url }}
        run: |
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "BACKEND_URL=${API_URL}" \
            --quiet

      - name: Update API CORS with Web URL
        env:
          WEB_URL: $(gcloud run services describe ${{ env.WEB_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
        run: |
          gcloud run services update ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --update-env-vars "Cors__Origins__0=${WEB_URL}" \
            --quiet

      - name: Print deployment URLs
        run: |
          echo "API: $(gcloud run services describe ${{ env.API_SERVICE }} --region ${{ env.GCP_REGION }} --project ${{ secrets.GCP_PROJECT_ID }} --format 'value(status.url)')"
          echo "Web: $(gcloud run services describe ${{ env.WEB_SERVICE }} --region ${{ env.GCP_REGION }} --project ${{ secrets.GCP_PROJECT_ID }} --format 'value(status.url)')"
