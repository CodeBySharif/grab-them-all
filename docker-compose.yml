services:
  api:
    build:
      context: ./backend/FerryFlight.Api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      OpenRouteService__ApiKey: ${OPENROUTESERVICE_API_KEY:-}
      Cors__Origins__0: http://localhost:8081
      Cors__Origins__1: http://127.0.0.1:8081

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      BACKEND_URL: http://api:8080
    depends_on:
      - api
